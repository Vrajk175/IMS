<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Add Ticket</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(
        135deg,
        #eef2ff 0%,
        #f5f3ff 50%,
        #fdf2f8 100%
      );
      min-height: 100vh;
    }

    .glass {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(18px);
    }

    .input-box {
      transition: all 0.25s ease;
    }

    .input-box:focus {
      transform: translateY(-2px);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
    }

  </style>
</head>

<body>

	<div th:replace="layout :: appLayout(~{::section})">

	  <section>

  <div class="glass rounded-3xl w-full max-w-3xl p-8 shadow-2xl border border-white/60">

    <form th:action="@{/save-ticket}" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-5">

      <!-- Issue -->
      <div class="md:col-span-2">

        <label class="block text-sm font-semibold text-gray-600 mb-2">
          Issue
        </label>

        <textarea
          name="issue"
          rows="4"
          placeholder="Enter ticket issue"
          required
          class="input-box w-full px-5 py-4 rounded-2xl border border-gray-200 outline-none bg-white/70"
        ></textarea>

      </div>


      <!-- Priority -->
      <div class="md:col-span-2">

        <label class="block text-sm font-semibold text-gray-600 mb-2">
          Priority
        </label>

        <select
          name="priority"
          required
          class="input-box w-full px-5 py-4 rounded-2xl border border-gray-200 outline-none bg-white/70"
        >

          <option value="">Select Priority</option>

          <option value="LOW">Low</option>

          <option value="MEDIUM">Medium</option>

          <option value="CRITICAL">Critical</option>

        </select>

      </div>


      <!-- Submit -->
      <div class="md:col-span-2 pt-4">

        <button
          type="submit"
          class="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold shadow-lg shadow-indigo-200 hover:scale-[1.02] transition-all"
        >
          Save Ticket
        </button>

      </div>

    </form>

  </div>


    </section>

  </div>
</body>
</html>
