<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPM Control Tower – Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 30%, #fce7f3 60%, #e0f2fe 100%);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #c7d2fe;
      border-radius: 99px;
    }

    /* Floating blobs */
    .blob {
      position: absolute;
      border-radius: 999px;
      filter: blur(70px);
      animation: floatBlob 8s ease-in-out infinite;
    }

    .blob-1 {
      width: 300px;
      height: 300px;
      background: rgba(99,102,241,0.25);
      top: -80px;
      left: -60px;
    }

    .blob-2 {
      width: 350px;
      height: 350px;
      background: rgba(236,72,153,0.22);
      bottom: -100px;
      right: -100px;
      animation-delay: 2s;
    }

    .blob-3 {
      width: 220px;
      height: 220px;
      background: rgba(139,92,246,0.20);
      top: 30%;
      right: 20%;
      animation-delay: 4s;
    }

    @keyframes floatBlob {
      0%,100% {
        transform: translateY(0px) scale(1);
      }
      50% {
        transform: translateY(-25px) scale(1.05);
      }
    }

    /* Card Animation */
    .glass-card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 20px 60px rgba(99,102,241,0.15);
    }

    /* Input Styling */
    .input-box {
      transition: all 0.3s ease;
    }

    .input-box:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
      transform: translateY(-1px);
    }

    /* Button Hover */
    .login-btn {
      transition: all 0.35s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(99,102,241,0.28);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* Pulse Ring */
    .pulse-ring {
      animation: pulseRing 2s infinite;
    }

    @keyframes pulseRing {
      0% {
        box-shadow: 0 0 0 0 rgba(99,102,241,0.4);
      }
      70% {
        box-shadow: 0 0 0 18px rgba(99,102,241,0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(99,102,241,0);
      }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-4">

  <!-- Animated Background -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Login Card -->
  <div
    class="glass-card relative w-full max-w-md rounded-3xl p-8 md:p-10"
    data-aos="zoom-in"
    data-aos-duration="1200"
  >

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="pulse-ring inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-500 to-violet-600 shadow-xl shadow-indigo-300 mb-5">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>

      <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">
        TPM Control Tower
      </h1>

      <p class="text-gray-400 text-sm mt-2 tracking-wide uppercase">
        Secure Admin Access
      </p>
    </div>

	<form action="/login" method="post" class="space-y-5">

	  <!-- Username -->
	  <div data-aos="fade-up" data-aos-delay="100">
	    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
	      Username
	    </label>

	    <div class="relative">
	      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400">
	        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
	          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
	        </svg>
	      </span>

	      <input
	        type="text"
	        name="username"
	        placeholder="Enter username"
	        class="input-box w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-200 bg-white/70 outline-none text-sm"
	      >
	    </div>
	  </div>

	  <!-- Password -->
	  <div data-aos="fade-up" data-aos-delay="200">
	    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
	      Password
	    </label>

	    <div class="relative">
	      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400">
	        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
	          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
	        </svg>
	      </span>

	      <input
	        type="password"
	        name="password"
	        placeholder="Enter password"
	        class="input-box w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-200 bg-white/70 outline-none text-sm"
	      >
	    </div>
	  </div>

	  <!-- Button -->
	  <button
	    type="submit"
	    class="login-btn w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold tracking-wide shadow-lg shadow-indigo-200"
	  >
	    Sign In
	  </button>

	</form>

    <!-- Footer -->
    <div class="mt-8 text-center text-xs text-gray-400">
      © 2026 TPM Control Tower • Secure Enterprise Portal
    </div>
  </div>

  <!-- AOS Script -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <script>
    AOS.init({
      once: true,
      easing: 'ease-out-cubic'
    });
  </script>

</body>
</html>
