<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    .glass {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(18px);
    }

    .table-row {
      transition: all 0.25s ease;
    }

    .table-row:hover {
      background: #eef2ff;
      transform: scale(1.005);
    }

    .icon-btn {
      transition: all 0.25s ease;
    }

    .icon-btn:hover {
      transform: scale(1.12);
    }

  </style>
</head>

<body>

<div th:replace="layout :: appLayout(~{::section})">

  <section>

    <div class="glass rounded-3xl overflow-hidden border border-white/60 shadow-xl">

      <div class="px-8 py-5 border-b border-indigo-100">

        <div class="flex items-center justify-between gap-4 flex-wrap">

          <div>
            <h2 class="text-xl font-bold text-gray-800">
              Tickets
            </h2>

            <p class="text-sm text-gray-400 mt-1">
              Filter tickets by status
            </p>
          </div>

          <div class="flex items-center gap-3 flex-wrap">

            <a th:href="@{/tickets}"
               class="px-5 py-3 rounded-2xl bg-gray-100 text-gray-600 text-sm font-bold hover:scale-105 transition-all">
              All
            </a>

            <a th:href="@{/tickets/status/OPEN}"
               class="px-5 py-3 rounded-2xl bg-indigo-100 text-indigo-600 text-sm font-bold hover:scale-105 transition-all">
              Open
            </a>

            <a th:href="@{/tickets/status/IN_PROGRESS}"
               class="px-5 py-3 rounded-2xl bg-violet-100 text-violet-600 text-sm font-bold hover:scale-105 transition-all">
              In Progress
            </a>

            <a th:href="@{/tickets/status/CLOSE}"
               class="px-5 py-3 rounded-2xl bg-rose-100 text-rose-500 text-sm font-bold hover:scale-105 transition-all">
              Closed
            </a>

            <a th:href="@{/add-ticket}"
               th:if="${role == 'SUPERADMIN'}"
               class="px-6 py-3 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold shadow-lg shadow-indigo-200 hover:scale-105 transition-all">
              + Add Ticket
            </a>

          </div>

        </div>

      </div>


      <div class="overflow-x-auto">

        <table class="w-full">

          <thead>

            <tr class="bg-indigo-50 text-left text-sm text-gray-500 uppercase tracking-wider">

              <th class="px-8 py-5">Ticket ID</th>

              <th class="px-8 py-5">Issue</th>

              <th class="px-8 py-5">Priority</th>

              <th class="px-8 py-5">Assigned To</th>

              <th class="px-8 py-5">Status</th>

              <th class="px-8 py-5">Action</th>

            </tr>

          </thead>


          <tbody>

            <tr class="table-row border-t border-indigo-50"
                th:each="ticket : ${tickets}">

              <td class="px-8 py-5 font-bold text-gray-800"
                  th:text="${ticket.ticket_id}">
              </td>

              <td class="px-8 py-5 text-gray-700 font-medium"
                  th:text="${ticket.issue}">
              </td>

              <td class="px-8 py-5">

                <span class="px-4 py-2 rounded-full text-xs font-semibold bg-orange-100 text-orange-600"
                      th:text="${ticket.priority}">
                </span>

              </td>

              <td class="px-8 py-5 text-gray-600 font-medium">

                <span th:if="${ticket.assignedTo == null or ticket.assignedTo == ''}"
                      class="text-gray-400">
                  Not Assigned
                </span>

                <span th:if="${ticket.assignedTo != null and ticket.assignedTo != ''}"
                      th:text="${ticket.assignedTo}">
                </span>

              </td>

              <td class="px-8 py-5">

                <span class="px-4 py-2 rounded-full text-xs font-semibold bg-indigo-100 text-indigo-600"
                      th:text="${ticket.status}">
                </span>

              </td>

              <td class="px-8 py-5">

                <div class="flex items-center gap-3 flex-wrap">

                  <a th:if="${ticket.status == 'OPEN' and role == 'SUPERADMIN'}"
                     th:href="@{/assign-ticket/{ticket_id}(ticket_id=${ticket.ticket_id})}"
                     class="px-3 py-2 rounded-xl bg-indigo-100 text-indigo-600 text-xs font-bold hover:scale-105 transition-all">
                    Assign
                  </a>

                  <form th:if="${ticket.status == 'IN_PROGRESS' and (role == 'SUPERADMIN' or ticket.assignedTo == user.username)}"
                        th:action="@{/close-ticket}"
                        method="post">

                    <input type="hidden" name="ticket_id" th:value="${ticket.ticket_id}">

                    <button
                      type="submit"
                      class="px-3 py-2 rounded-xl bg-rose-100 text-rose-500 text-xs font-bold hover:scale-105 transition-all"
                    >
                      Close
                    </button>

                  </form>

                  <span th:if="${ticket.status == 'IN_PROGRESS' and role != 'SUPERADMIN' and ticket.assignedTo != user.username}"
                        class="px-3 py-2 rounded-xl bg-gray-100 text-gray-400 text-xs font-bold">
                    Assigned
                  </span>

                  <button
                    type="button"
                    th:if="${ticket.status == 'CLOSE'}"
                    disabled
                    class="px-3 py-2 rounded-xl bg-gray-100 text-gray-400 text-xs font-bold cursor-not-allowed"
                  >
                    Closed
                  </button>

                  <form th:if="${role == 'SUPERADMIN'}"
                        th:action="@{/delete-ticket}"
                        method="post"
                        onsubmit="return confirm('Are you sure you want to delete this ticket?')">

                    <input type="hidden" name="ticket_id" th:value="${ticket.ticket_id}">

                    <button
                      type="submit"
                      class="icon-btn w-10 h-10 rounded-xl bg-rose-100 text-rose-500 flex items-center justify-center"
                    >

                      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7h6m2 0H7m3-3h4a1 1 0 011 1v2H9V5a1 1 0 011-1z"/>
                      </svg>

                    </button>

                  </form>

                  <span th:if="${role != 'SUPERADMIN' and ticket.status == 'OPEN'}"
                        class="text-xs font-semibold text-gray-400">
                    Waiting for assignment
                  </span>

                </div>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </section>

</div>

</body>
</html>
