<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TPM Staff Management</title>

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(
        135deg,
        #eef2ff 0%,
        #f5f3ff 50%,
        #fdf2f8 100%
      );
      min-height: 100vh;
    }

    .glass {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(18px);
    }

    .table-row {
      transition: all 0.25s ease;
    }

    .table-row:hover {
      background: #eef2ff;
      transform: scale(1.01);
    }

    .modal {
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      transform: translateY(30px);
      transition: all 0.3s ease;
    }

    .modal.show .modal-card {
      transform: translateY(0);
    }

    .input-box {
      transition: all 0.25s ease;
    }

    .input-box:focus {
      transform: translateY(-2px);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
    }

  </style>

</head>

<body>


<!-- ================= HEADER ================= -->

<header class="glass sticky top-0 z-50 px-8 py-5 border-b border-indigo-100 shadow-sm flex items-center justify-between">

  <div class="flex items-center gap-4">

    <!-- Logo -->

    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-200">

      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/>
      </svg>

    </div>


    <div>

      <h1 class="text-2xl font-bold text-gray-800">
        Staff Management
      </h1>

      <p class="text-xs uppercase tracking-widest text-indigo-500 font-semibold">
        TPM Enterprise Control Tower
      </p>

    </div>

  </div>


  <!-- Add Staff Button -->

  <button
    onclick="openModal()"
    class="px-6 py-3 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold shadow-lg shadow-indigo-200 hover:scale-105 transition-all"
  >
    + Add Staff
  </button>

</header>


<!-- ================= MAIN ================= -->

<main class="p-8">

  <div class="glass rounded-3xl overflow-hidden border border-white/60 shadow-xl">

    <!-- Header -->

    <div class="px-8 py-5 border-b border-indigo-100">

      <h2 class="text-xl font-bold text-gray-800">
        All Staff Members
      </h2>

      <p class="text-sm text-gray-400 mt-1">
        Manage TPM engineers and admins
      </p>

    </div>


    <!-- Table -->

    <div class="overflow-x-auto">

      <table class="w-full">

        <thead>

          <tr class="bg-indigo-50 text-left text-sm text-gray-500 uppercase tracking-wider">

            <th class="px-8 py-5">Avatar</th>

            <th class="px-8 py-5">Name</th>

            <th class="px-8 py-5">Username</th>

            <th class="px-8 py-5">Role</th>

          </tr>

        </thead>


        <tbody>

          <!-- Thymeleaf -->

          <tr class="table-row border-t border-indigo-50"
              th:each="user : ${users}">

            <!-- Avatar -->

            <td class="px-8 py-5">

             <!-- <img
                th:src="${user.avatar}"
                th:alt="${user.name}"
                class="w-14 h-14 rounded-2xl object-cover border-2 border-indigo-100 shadow-md"
              />-->

            </td>


            <!-- Name -->

            <td
              class="px-8 py-5 font-semibold text-gray-800"
              th:text="${user.name}"
            >
              
            </td>


            <!-- Username -->

            <td
              class="px-8 py-5 text-gray-500"
              th:text="${user.username}"
            >
              
            </td>


            <!-- Role -->

            <td class="px-8 py-5">

              <span
                class="px-4 py-2 rounded-full text-xs font-semibold bg-indigo-100 text-indigo-600"
                th:text="${user.role}"
              >
                
              </span>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</main>


<!-- ================= ADD STAFF MODAL ================= -->

<div
  id="staffModal"
  class="modal fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-5"
>

  <div class="modal-card glass rounded-3xl w-full max-w-2xl p-8 shadow-2xl border border-white/60">

    <!-- Header -->

    <div class="flex items-center justify-between mb-8">

      <div>

        <h2 class="text-2xl font-bold text-gray-800">
          Add New Staff
        </h2>

        <p class="text-sm text-gray-400 mt-1">
          Create TPM user account
        </p>

      </div>


      <button
        onclick="closeModal()"
        class="w-10 h-10 rounded-xl bg-rose-100 text-rose-500 hover:scale-110 transition-all"
      >
        ✕
      </button>

    </div>


    <!-- Form -->

    <form action="/add-staff" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-5">


      <!-- Name -->

      <div>

        <label class="block text-sm font-semibold text-gray-600 mb-2">
          Full Name
        </label>

        <input
          type="text"
          name="name"
          placeholder="Enter full name"
          class="input-box w-full px-5 py-4 rounded-2xl border border-gray-200 outline-none bg-white/70"
        >

      </div>


      <!-- Username -->

      <div>

        <label class="block text-sm font-semibold text-gray-600 mb-2">
          Username
        </label>

        <input
          type="text"
          name="username"
          placeholder="Enter username"
          class="input-box w-full px-5 py-4 rounded-2xl border border-gray-200 outline-none bg-white/70"
        >

      </div>


      <!-- Password -->

      <div>

        <label class="block text-sm font-semibold text-gray-600 mb-2">
          Password
        </label>

        <input
          type="password"
          name="password"
          placeholder="Enter password"
          class="input-box w-full px-5 py-4 rounded-2xl border border-gray-200 outline-none bg-white/70"
        >

      </div>


      <!-- Role -->

      <div>

        <label class="block text-sm font-semibold text-gray-600 mb-2">
          Role
        </label>

        <select
          name="role"
          class="input-box w-full px-5 py-4 rounded-2xl border border-gray-200 outline-none bg-white/70"
        >

          <option value="ENGINEER">
            ENGINEER
          </option>

          <option value="SUPERADMIN">
            SUPERADMIN
          </option>

        </select>

      </div>


      <!-- Avatar -->

      <div class="md:col-span-2">

        <label class="block text-sm font-semibold text-gray-600 mb-2">
          Avatar URL
        </label>

        <input
          type="text"
          name="avatar"
          placeholder="Paste image URL"
          class="input-box w-full px-5 py-4 rounded-2xl border border-gray-200 outline-none bg-white/70"
        >

      </div>


      <!-- Button -->

      <div class="md:col-span-2 pt-4">

        <button
          type="submit"
          class="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold shadow-lg shadow-indigo-200 hover:scale-[1.02] transition-all"
        >
          Create Staff Account
        </button>

      </div>

    </form>

  </div>

</div>


<!-- ================= JS ================= -->

<script>

  const modal = document.getElementById("staffModal");


  function openModal() {
    modal.classList.add("show");
  }


  function closeModal() {
    modal.classList.remove("show");
  }


  window.addEventListener("click", function(e) {

    if(e.target === modal) {
      closeModal();
    }

  });

</script>

</body>
</html>
