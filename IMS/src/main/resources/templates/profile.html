<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TPM Profile</title>

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(
        135deg,
        #eef2ff 0%,
        #f5f3ff 50%,
        #fdf2f8 100%
      );
      min-height: 100vh;
    }

    .glass {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(18px);
    }

    .profile-card {
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {

      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

    }

    .info-card {
      transition: all 0.25s ease;
    }

    .info-card:hover {
      transform: translateY(-4px);
      background: #eef2ff;
    }

  </style>

</head>

<body>


<!-- ================= NAVBAR ================= -->

<header class="glass sticky top-0 z-50 px-8 py-5 border-b border-indigo-100 shadow-sm flex items-center justify-between">

  <div class="flex items-center gap-4">

    <!-- Logo -->

    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-200">

      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>

    </div>


    <div>

      <h1 class="text-2xl font-bold text-gray-800">
        My Profile
      </h1>

      <p class="text-xs uppercase tracking-widest text-indigo-500 font-semibold">
        TPM Enterprise Control Tower
      </p>

    </div>

  </div>


  <!-- Back Button -->

  <a
    href="/dashboard"
    class="px-5 py-3 rounded-2xl bg-indigo-100 text-indigo-600 font-semibold hover:scale-105 transition-all"
  >
    ← Dashboard
  </a>

</header>


<!-- ================= MAIN ================= -->

<main class="p-8 flex justify-center" th:each="user : ${users}">

  <div class="profile-card glass rounded-3xl w-full max-w-4xl overflow-hidden shadow-2xl border border-white/60">


    <!-- Top Banner -->

    <div class="h-52 bg-gradient-to-r from-indigo-500 via-violet-500 to-pink-500 relative">

      <!-- Avatar -->

      <div class="absolute left-10 bottom-[-50px]">

        <img
          th:src="${user.avatar}"
          th:alt="${user.name}"
          class="w-32 h-32 rounded-3xl object-cover border-4 border-white shadow-2xl"
        />

      </div>

    </div>


    <!-- Content -->

    <div class="pt-20 px-10 pb-10">


      <!-- Name -->

      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

        <div>

          <h2
            class="text-4xl font-extrabold text-gray-800"
            th:text="${user.name}"
          >
            
          </h2>

          <p
            class="text-indigo-500 font-semibold uppercase tracking-widest mt-2"
            th:text="${user.role}"
          >
            
          </p>

        </div>


        


      <!-- Info Grid -->

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10">


        <!-- Username -->

        <div class="info-card glass rounded-3xl p-6 border border-indigo-100">

          <p class="text-sm text-indigo-400 uppercase tracking-widest font-semibold mb-3">
            Username
          </p>

          <h3
            class="text-2xl font-bold text-gray-800"
            th:text="${user.username}"
          >
           
          </h3>

        </div>


        <!-- Role -->

        <div class="info-card glass rounded-3xl p-6 border border-violet-100">

          <p class="text-sm text-violet-400 uppercase tracking-widest font-semibold mb-3">
            Role
          </p>

          <h3
            class="text-2xl font-bold text-gray-800"
            th:text="${user.role}"
          >
            
          </h3>

        </div>


        <!-- Password -->

        <div class="info-card glass rounded-3xl p-6 border border-pink-100">

          <p class="text-sm text-pink-400 uppercase tracking-widest font-semibold mb-3">
            Password
          </p>

          <h3
            class="text-2xl font-bold text-gray-800"
            th:text="${user.password}"
          >
            ********
          </h3>

        </div>


        <!-- User ID -->

        <div class="info-card glass rounded-3xl p-6 border border-indigo-100">

          <p class="text-sm text-indigo-400 uppercase tracking-widest font-semibold mb-3">
            User ID
          </p>

          <h3
            class="text-2xl font-bold text-gray-800"
            th:text="${user.id}"
          >
            
          </h3>

        </div>

      </div>


      <!-- Bottom Action -->

      <div class="mt-10 flex flex-wrap gap-4">

        <a
          href="/staff"
          class="px-6 py-3 rounded-2xl bg-indigo-100 text-indigo-600 font-semibold hover:scale-105 transition-all"
        >
          Staff Management
        </a>


        <a
          href="/logout"
          class="px-6 py-3 rounded-2xl bg-rose-100 text-rose-500 font-semibold hover:scale-105 transition-all"
        >
          Logout
        </a>

      </div>

    </div>

  </div>

</main>

</body>
</html>
